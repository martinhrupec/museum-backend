services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: museum_postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - museum_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: museum_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - museum_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5


  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: museum_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - REDIS_URL=redis://redis:6379/1
      - TZ=Europe/Zagreb
      - RUN_MIGRATIONS=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - museum_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: museum_celery_worker
    command: celery -A core worker -l INFO --concurrency=2
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - REDIS_URL=redis://redis:6379/1
      - TZ=Europe/Zagreb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - museum_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: museum_celery_beat
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - REDIS_URL=redis://redis:6379/1
      - TZ=Europe/Zagreb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - museum_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  museum_network:
    driver: bridge
