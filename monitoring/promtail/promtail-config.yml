server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Svi Docker container logovi (stdout/stderr) — auto-discovery preko socketa
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

  # Django file logovi iz ./logs (ako pises u file, ne samo stdout)
  - job_name: django_app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: django
          service: museum_web
          __path__: /app/logs/*.log

  # Host syslog (opcionalno — ako treba sistem logove VPS-a)
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: vps
          __path__: /var/log/*.log
