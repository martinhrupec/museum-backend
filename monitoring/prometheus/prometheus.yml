global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'museum-monitor'

scrape_configs:
  # Prometheus sam sebe
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Host metrike (CPU, RAM, disk, mreža)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # Container metrike (svi kontejneri na hostu)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Django /metrics endpoint — aktivirati kad dodas django-prometheus
  - job_name: 'django'
    metrics_path: /metrics
    static_configs:
      - targets: ['web:8000']
